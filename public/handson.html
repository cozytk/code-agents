<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>비밀번호 강도 측정기 — Claude Code 핸즈온 결과</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  :root{--paper:#0F1217;--ink:#E9EDF3;--dim:#8C97A8;--rule:#262D38;--card:#161B23;--accent:#4FCDC2;
    --bad:#F0625D;--warn:#E2A33C;--ok:#46C28C;
    --sans:'Pretendard',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--display:'Space Grotesk',var(--sans)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--paper);color:var(--ink);font-family:var(--sans);padding:2rem}
  .card{width:400px;background:var(--card);border:1px solid var(--rule);border-radius:16px;padding:1.8rem}
  h1{font-family:var(--display);font-size:1.3rem;margin:0 0 .2rem}
  .sub{color:var(--dim);font-size:.82rem;margin:0 0 1.4rem}
  label{display:block;font-size:.78rem;color:var(--dim);margin:0 0 .35rem;font-family:var(--mono)}
  input{width:100%;background:var(--paper);border:1px solid var(--rule);border-radius:8px;color:var(--ink);
    font-family:var(--mono);font-size:1rem;padding:.65rem .8rem}
  input:focus{outline:none;border-color:var(--accent)}
  .meter{height:10px;border-radius:999px;background:var(--paper);border:1px solid var(--rule);margin:1.1rem 0 .5rem;overflow:hidden}
  .meter > div{height:100%;width:0;border-radius:999px;transition:width .35s ease, background .35s ease}
  .verdict{font-family:var(--display);font-weight:700;font-size:1.15rem;margin-bottom:1rem}
  .checks{display:grid;gap:.4rem;margin:0}
  .checks div{display:flex;align-items:center;gap:.5rem;font-size:.84rem;color:var(--dim);font-family:var(--mono)}
  .checks div.on{color:var(--ink)}
  .dot{width:1.05rem;text-align:center}
  .tag{margin-top:1.2rem;font-family:var(--mono);font-size:.64rem;color:var(--dim);text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>비밀번호 강도 측정기</h1>
  <p class="sub">입력하면 실시간으로 강도와 충족 조건을 보여줍니다.</p>
  <label>비밀번호</label>
  <input id="pw" type="text" value="claude2026!" autocomplete="off" />
  <div class="meter"><div id="bar"></div></div>
  <div class="verdict" id="verdict">—</div>
  <div class="checks">
    <div id="c-len"><span class="dot">○</span> 8자 이상</div>
    <div id="c-upper"><span class="dot">○</span> 대문자 포함</div>
    <div id="c-num"><span class="dot">○</span> 숫자 포함</div>
    <div id="c-sym"><span class="dot">○</span> 특수문자 포함</div>
  </div>
  <p class="tag">⌁ Claude Code 핸즈온으로 만든 결과 · cozytk.github.io/code-agents/handson.html</p>
</div>
<script>
  const $ = id => document.getElementById(id);
  const rules = {
    'c-len':  v => v.length >= 8,
    'c-upper':v => /[A-Z]/.test(v),
    'c-num':  v => /[0-9]/.test(v),
    'c-sym':  v => /[^A-Za-z0-9]/.test(v),
  };
  const EMPTY = { t: '비어 있음', c: 'var(--dim)', w: 0 };
  const LEVELS = [
    { t: '약함',      c: 'var(--bad)',  w: 22 },   // 0개 충족
    { t: '약함',      c: 'var(--bad)',  w: 34 },   // 1개
    { t: '보통',      c: 'var(--warn)', w: 58 },   // 2개
    { t: '강함',      c: 'var(--ok)',   w: 80 },   // 3개
    { t: '아주 강함', c: 'var(--accent)', w: 100 }, // 4개
  ];
  function update(){
    const v = $('pw').value;
    let score = 0;
    for (const id in rules){
      const ok = rules[id](v);
      const el = $(id);
      el.classList.toggle('on', ok);
      el.querySelector('.dot').textContent = ok ? '●' : '○';
      if (ok) score++;
    }
    const lv = v.length === 0 ? EMPTY : LEVELS[score];
    $('bar').style.width = lv.w + '%';
    $('bar').style.background = lv.c;
    $('verdict').textContent = lv.t;
    $('verdict').style.color = lv.c;
  }
  $('pw').addEventListener('input', update);
  update();
</script>
</body>
</html>
