<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>더치페이 계산기 — Claude Code 핸즈온 결과</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  :root{--paper:#0F1217;--ink:#E9EDF3;--dim:#8C97A8;--rule:#262D38;--card:#161B23;--accent:#4FCDC2;
    --sans:'Pretendard',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--display:'Space Grotesk',var(--sans)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--paper);color:var(--ink);font-family:var(--sans);padding:2rem}
  .card{width:380px;background:var(--card);border:1px solid var(--rule);border-radius:16px;padding:1.8rem}
  h1{font-family:var(--display);font-size:1.3rem;margin:0 0 .2rem}
  .sub{color:var(--dim);font-size:.82rem;margin:0 0 1.4rem}
  label{display:block;font-size:.78rem;color:var(--dim);margin:.9rem 0 .3rem;font-family:var(--mono)}
  input{width:100%;background:var(--paper);border:1px solid var(--rule);border-radius:8px;color:var(--ink);
    font-family:var(--mono);font-size:1rem;padding:.6rem .8rem}
  input:focus{outline:none;border-color:var(--accent)}
  .out{margin-top:1.5rem;padding:1.1rem;border:1px solid var(--accent);border-radius:10px;background:#102A29;text-align:center}
  .out small{display:block;font-family:var(--mono);font-size:.7rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem}
  .out b{font-family:var(--display);font-size:2.1rem;font-weight:700}
  .tag{margin-top:1.1rem;font-family:var(--mono);font-size:.66rem;color:var(--dim);text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>더치페이 계산기</h1>
  <p class="sub">금액과 팁, 인원을 넣으면 1인당 금액이 나옵니다.</p>
  <label>금액 (원)</label>
  <input id="bill" type="number" value="80000" />
  <label>팁 (%)</label>
  <input id="tip" type="number" value="10" />
  <label>인원 (명)</label>
  <input id="people" type="number" value="4" />
  <div class="out"><small>1인당</small><b id="result">₩0</b></div>
  <p class="tag">⌁ Claude Code 핸즈온으로 고친 결과 · cozytk.github.io/code-agents/handson.html</p>
</div>
<script>
  const $ = id => document.getElementById(id);
  function calc(){
    const bill = +$('bill').value;
    const tip = +$('tip').value;
    const people = +$('people').value;
    const total = bill * (1 + tip / 100);   // 금액 + 팁
    const per = people ? total / people : 0; // 인원으로 나눔
    $('result').textContent = '₩' + Math.round(per).toLocaleString();
  }
  ['bill','tip','people'].forEach(id => $(id).addEventListener('input', calc));
  calc();
</script>
</body>
</html>
